<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Binding recording…</title>
    <meta name="robots" content="noindex" />
  </head>
  <body>
    <!--
      Intentionally blank. The headless browser briefly navigates here
      with `#recording=<uuid>` so the recorder extension's
      webNavigation.onCommitted listener picks up the session id and
      writes it to chrome.storage.local. As soon as the page commits,
      the controlling code navigates the tab back to about:blank.
    -->
  </body>
</html>
